<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Payment Failed</title>
  <style>
    body { font-family: Arial, sans-serif; background: #fff0f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; width: 360px; }
    .icon { font-size: 60px; }
    h2 { color: #dc2626; margin: 16px 0 8px; }
    p  { color: #555; font-size: 14px; margin: 4px 0; }
    a  { display: inline-block; margin-top: 20px; padding: 10px 24px; background: #dc2626; color: white; border-radius: 8px; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">❌</div>
    <h2>Payment Failed</h2>
    <p id="txnInfo"></p>
    <p>Please try again or use a different payment method.</p>
    <a href="/">Try Again</a>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("txnInfo").textContent = "Transaction ID: " + (params.get("txnId") || "N/A");
  </script>
</body>
</html>
